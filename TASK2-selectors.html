<!-- <!DOCTYPE html> : Declares the document as HTML5 -->

<!-- <html> : Root element of the webpage -->

<!-- <head> : Contains metadata, title, and CSS -->

<!-- <style> : Used to write internal CSS -->

<!-- h1 : Element selector, applies styles to all h1 headings -->

<!-- .note : Class selector, applies styles to elements with class="note" -->

<!-- #title : ID selector, applies styles to element with id="title" -->

<!-- color : Sets the text color -->

<!-- <meta charset="UTF-8"> : Supports special characters -->

<!-- <meta name="viewport"> : Makes page responsive on different devices -->

<!-- <title> : Sets the browser tab title -->

<!-- <body> : Contains all visible webpage content -->

<!-- <h1> : Main heading -->

<!-- <p> : Paragraph -->

<!-- class="note" : Assigns the paragraph to the note class -->

<!-- class="note1" : Assigns the paragraph to the note1 class -->

<!-- id="title" : Assigns a unique identifier to an element -->
 <!DOCTYPE html>
<html lang="en">
    <style>
        h1{
            color:rgb(236, 165, 71);
        }
        .note{
            color:rgb(23, 184, 108);
        }
        #title{
            color:rgb(226, 113, 192);
        }
    </style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hi</h1>
    <p class="note">hi sadhana</p>
    <p class="note">Hello sadhana</p>
    <p class="note1">Hello sadhana</p>
    
    <p id="title">how are you</p>
    <p id="title">how are you</p>
</body>
</html>
